name: tests

run-name: tests · ${{ github.ref_name }} · ${{ github.sha }}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt in to Node.js 24 for JavaScript actions now.
# This prevents Node.js 20 deprecation warnings on GitHub Actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONUTF8: "1"

jobs:
  test:
    name: python-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Compile Python files
        run: |
          python -m compileall -q solution tests

      - name: Run benchmark
        run: |
          python -m solution.run_benchmark

      - name: Run unit and smoke tests
        env:
          # Benchmark was already generated above.
          # tests/test_run_benchmark.py can reuse it to avoid duplicate benchmark runs.
          REUSE_BENCHMARK_RESULTS: "1"
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run quality gate
        run: |
          python -m solution.check_quality_gate

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-python-${{ matrix.python-version }}
          path: solution/benchmark_results.json
          if-no-files-found: error
          retention-days: 14
