name: ci-cd

run-name: ci-cd · ${{ github.ref_name }} · ${{ github.sha }}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONUTF8: "1"

jobs:
  ci:
    name: ci · python-3.11
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Compile Python files
        run: |
          python -m compileall -q solution tests

      - name: Run benchmark
        run: |
          python -m solution.run_benchmark

      - name: Run unit and smoke tests
        env:
          # Benchmark was already generated above.
          # tests/test_run_benchmark.py can reuse it to avoid duplicate benchmark runs.
          REUSE_BENCHMARK_RESULTS: "1"
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run quality gate
        run: |
          python -m solution.check_quality_gate

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: solution/benchmark_results.json
          if-no-files-found: error
          retention-days: 14

  fake_deploy:
    name: fake cd · staging
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Fake CD should run only after CI passes on main, or when triggered manually.
    # It intentionally does not deploy to a real server.
    if: |
      needs.ci.result == 'success' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))

    environment:
      name: fake-staging

    steps:
      - name: Download benchmark artifact
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results
          path: fake-deploy-artifacts

      - name: Validate deploy artifact
        run: |
          test -f fake-deploy-artifacts/benchmark_results.json
          python -m json.tool fake-deploy-artifacts/benchmark_results.json > /dev/null

      - name: Simulate deployment
        run: |
          mkdir -p fake-deploy-output
          cp fake-deploy-artifacts/benchmark_results.json fake-deploy-output/benchmark_results.json
          cat > fake-deploy-output/deployment_summary.md <<'EOF'
          # Fake CD Deployment Summary

          Status: simulated
          Environment: fake-staging
          Source branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}

          This job intentionally does not deploy to a real server.
          It validates that the benchmark artifact can pass through a CD-like stage.
          EOF

      - name: Write GitHub job summary
        run: |
          cat fake-deploy-output/deployment_summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Artifact files" >> "$GITHUB_STEP_SUMMARY"
          find fake-deploy-output -maxdepth 1 -type f -print >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fake deployment artifact
        uses: actions/upload-artifact@v7
        with:
          name: fake-deployment-summary
          path: fake-deploy-output/
          if-no-files-found: error
          retention-days: 14
